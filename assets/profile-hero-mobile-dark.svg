<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 300" role="img" aria-labelledby="title desc">
  <title id="title">Hi, I'm Alina</title>
  <desc id="desc">I make AI coding agents understand what they change — and prove it. A quiet codegraph flows from context to audit.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0D1117"/>
      <stop offset="0.6" stop-color="#111820"/>
      <stop offset="1" stop-color="#0D1117"/>
    </linearGradient>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" fill="none" stroke="#9DA7B3" stroke-opacity="0.045"/>
    </pattern>
    <style><![CDATA[
      .signal { stroke-dasharray: 5 13; animation: flow 9s linear infinite; }
      @keyframes flow { to { stroke-dashoffset: -180; } }
      @media (prefers-reduced-motion: reduce) { .signal { animation: none; } }
    ]]></style>
  </defs>

  <rect x="5" y="5" width="710" height="290" rx="16" fill="url(#bg)" stroke="#C58A5A" stroke-opacity="0.34"/>
  <rect x="6" y="6" width="708" height="288" rx="15" fill="url(#grid)"/>

  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
    <text x="38" y="52" fill="#C58A5A" font-size="20" font-weight="650" letter-spacing="2.4">HI, I'M ALINA.</text>
    <text x="38" y="94" fill="#F3EDE2" font-size="29" font-weight="650">I make AI coding agents</text>
    <text x="38" y="130" fill="#F3EDE2" font-size="29" font-weight="650">understand what they change</text>
    <text x="38" y="166" fill="#F3EDE2" font-size="29" font-weight="650">— and prove it.</text>
  </g>
  <text x="38" y="204" fill="#9DA7B3" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14.5" letter-spacing="0.7">Building Mastermind · MCP · code intelligence · evals</text>

  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M38 252H150l24-14h104l24 14h104l24-14h104l24 14h128" stroke="#C58A5A" stroke-opacity="0.25" stroke-width="1.4"/>
    <path class="signal" d="M38 252H150l24-14h104l24 14h104l24-14h104l24 14h128" stroke="#C58A5A" stroke-opacity="0.7" stroke-width="1.7"/>
  </g>
  <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="10" letter-spacing="1" text-anchor="middle">
    <g fill="#52B8FF"><circle cx="84" cy="252" r="3.5"/><text x="84" y="276">CONTEXT</text></g>
    <g fill="#C58A5A"><circle cx="226" cy="238" r="3.5"/><text x="226" y="228">PLAN</text></g>
    <g fill="#F3EDE2"><circle cx="354" cy="252" r="3.5"/><text x="354" y="276">CHANGE</text></g>
    <g fill="#2DD4BF"><circle cx="482" cy="238" r="3.5"/><text x="482" y="228">TEST</text></g>
    <g fill="#2DD4BF"><circle cx="610" cy="252" r="3.5"/><text x="610" y="276">AUDIT</text></g>
  </g>
</svg>
