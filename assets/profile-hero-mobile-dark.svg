<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 660" role="img" aria-labelledby="title desc">
  <title id="title">Alina Glumova — AI Agent Infrastructure</title>
  <desc id="desc">A numbered codegraph flows downward through context, plan, change, test, and audit around Alina Glumova's name.</desc>
  <defs>
    <linearGradient id="mobile-dark-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0D1117"/>
      <stop offset="0.52" stop-color="#111820"/>
      <stop offset="1" stop-color="#0D1117"/>
    </linearGradient>
    <pattern id="mobile-dark-grid" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M36 0H0V36" fill="none" stroke="#9DA7B3" stroke-opacity="0.055"/>
    </pattern>
    <style><![CDATA[
      .signal { stroke-dasharray: 7 15; animation: signal-flow 8s linear infinite; }
      .pulse { animation: node-pulse 5s ease-in-out infinite; }
      .p2 { animation-delay: 1s; }
      .p3 { animation-delay: 2s; }
      .p4 { animation-delay: 3s; }
      .p5 { animation-delay: 4s; }
      @keyframes signal-flow { to { stroke-dashoffset: -220; } }
      @keyframes node-pulse { 0%, 18%, 100% { opacity: .18; } 7% { opacity: .78; } }
      @media (prefers-reduced-motion: reduce) {
        .signal, .pulse { animation: none; }
        .pulse { opacity: .32; }
      }
    ]]></style>
  </defs>

  <rect x="8" y="8" width="704" height="644" rx="20" fill="url(#mobile-dark-bg)" stroke="#C58A5A" stroke-opacity="0.38"/>
  <rect x="9" y="9" width="702" height="642" rx="19" fill="url(#mobile-dark-grid)"/>

  <g fill="#9DA7B3" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12" letter-spacing="2">
    <text x="32" y="39">LOCAL-FIRST / 01</text>
    <text x="688" y="39" text-anchor="end">VERIFIED / 05</text>
  </g>

  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M32 72h100l24 24h78" stroke="#52B8FF" stroke-opacity="0.18"/>
    <path d="M486 96h78l24-24h100" stroke="#2DD4BF" stroke-opacity="0.17"/>
    <path d="M32 72h100l24 24h78" class="signal" stroke="#52B8FF" stroke-opacity="0.5" stroke-width="1.5"/>
    <path d="M486 96h78l24-24h100" class="signal" stroke="#2DD4BF" stroke-opacity="0.46" stroke-width="1.5"/>
  </g>

  <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" text-anchor="middle">
    <text x="360" y="112" fill="#F3EDE2" font-size="46" font-weight="700" letter-spacing="7">ALINA GLUMOVA</text>
    <text x="360" y="153" fill="#C58A5A" font-size="20" font-weight="600" letter-spacing="4">AI AGENT INFRASTRUCTURE</text>
    <line x1="218" y1="179" x2="502" y2="179" stroke="#52B8FF" stroke-opacity="0.45"/>
    <circle cx="208" cy="179" r="3" fill="#52B8FF"/>
    <circle cx="512" cy="179" r="3" fill="#2DD4BF"/>
    <text x="360" y="209" fill="#9DA7B3" font-size="17" letter-spacing="2.2">MCP · CODE INTELLIGENCE · EVALS</text>
  </g>

  <line x1="68" y1="240" x2="652" y2="240" stroke="#9DA7B3" stroke-opacity="0.16"/>
  <text x="68" y="277" fill="#C58A5A" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14" font-weight="600" letter-spacing="3">VERIFICATION PATH</text>

  <g fill="none" stroke-linecap="round">
    <path d="M150 315v264" stroke="#C58A5A" stroke-opacity="0.28" stroke-width="1.5"/>
    <path d="M150 315v264" class="signal" stroke="#C58A5A" stroke-opacity="0.72" stroke-width="2"/>
  </g>

  <g fill="none" stroke="#C58A5A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.68">
    <path d="m143 357 7 7 7-7"/>
    <path d="m143 421 7 7 7-7"/>
    <path d="m143 485 7 7 7-7"/>
    <path d="m143 549 7 7 7-7"/>
  </g>

  <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
    <g>
      <circle class="pulse" cx="150" cy="323" r="21" fill="#52B8FF" opacity="0.18"/>
      <circle cx="150" cy="323" r="6" fill="#0D1117" stroke="#52B8FF" stroke-width="2.5"/>
      <text x="70" y="330" fill="#52B8FF" font-size="18" letter-spacing="2">01</text>
      <text x="196" y="331" fill="#F3EDE2" font-size="22" font-weight="600" letter-spacing="3">CONTEXT</text>
    </g>
    <g>
      <circle class="pulse p2" cx="150" cy="387" r="21" fill="#C58A5A" opacity="0.18"/>
      <circle cx="150" cy="387" r="6" fill="#0D1117" stroke="#C58A5A" stroke-width="2.5"/>
      <text x="70" y="394" fill="#C58A5A" font-size="18" letter-spacing="2">02</text>
      <text x="196" y="395" fill="#F3EDE2" font-size="22" font-weight="600" letter-spacing="3">PLAN</text>
    </g>
    <g>
      <circle class="pulse p3" cx="150" cy="451" r="21" fill="#C58A5A" opacity="0.18"/>
      <circle cx="150" cy="451" r="6" fill="#0D1117" stroke="#C58A5A" stroke-width="2.5"/>
      <text x="70" y="458" fill="#C58A5A" font-size="18" letter-spacing="2">03</text>
      <text x="196" y="459" fill="#F3EDE2" font-size="22" font-weight="600" letter-spacing="3">CHANGE</text>
      <path d="M407 451h205" stroke="#C58A5A" stroke-opacity="0.36"/>
      <text x="628" y="457" fill="#C58A5A" font-size="12" text-anchor="end" letter-spacing="2">ACTIVE</text>
    </g>
    <g>
      <circle class="pulse p4" cx="150" cy="515" r="21" fill="#2DD4BF" opacity="0.18"/>
      <circle cx="150" cy="515" r="6" fill="#0D1117" stroke="#2DD4BF" stroke-width="2.5"/>
      <text x="70" y="522" fill="#2DD4BF" font-size="18" letter-spacing="2">04</text>
      <text x="196" y="523" fill="#F3EDE2" font-size="22" font-weight="600" letter-spacing="3">TEST</text>
    </g>
    <g>
      <circle class="pulse p5" cx="150" cy="579" r="21" fill="#2DD4BF" opacity="0.18"/>
      <circle cx="150" cy="579" r="6" fill="#0D1117" stroke="#2DD4BF" stroke-width="2.5"/>
      <text x="70" y="586" fill="#2DD4BF" font-size="18" letter-spacing="2">05</text>
      <text x="196" y="587" fill="#F3EDE2" font-size="22" font-weight="600" letter-spacing="3">AUDIT</text>
    </g>
  </g>

  <text x="688" y="625" fill="#9DA7B3" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12" text-anchor="end" letter-spacing="2">MCP / LOCAL CODEGRAPH</text>
</svg>
