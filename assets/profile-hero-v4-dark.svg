<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 220" role="img" aria-labelledby="title desc">
  <title id="title">Hi, I'm Alina</title>
  <desc id="desc">Software engineer exploring AI in real systems. Alina moves through a topology of Edge AI, agent systems, secure software, and open source.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0D1117"/>
      <stop offset="0.55" stop-color="#111820"/>
      <stop offset="1" stop-color="#0D1117"/>
    </linearGradient>
    <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse">
      <path d="M28 0H0V28" fill="none" stroke="#AAB4C0" stroke-opacity="0.045"/>
    </pattern>
    <filter id="glow" x="-300%" y="-300%" width="700%" height="700%">
      <feGaussianBlur stdDeviation="2.4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style><![CDATA[
      .route { stroke-dasharray: 2 7; }
      .traveller { filter: url(#glow); }
      .traveller-static { opacity: 0.72; }
      @media (prefers-reduced-motion: reduce) {
        .traveller { display: none; }
      }
    ]]></style>
  </defs>

  <rect x="5" y="5" width="1190" height="210" rx="16" fill="url(#bg)" stroke="#C58A5A" stroke-opacity="0.34"/>
  <rect x="6" y="6" width="1188" height="208" rx="15" fill="url(#grid)"/>

  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
    <text x="50" y="55" fill="#C58A5A" font-size="16" font-weight="650" letter-spacing="2.2">HI, I'M ALINA.</text>
    <text x="50" y="99" fill="#F3EDE2" font-size="27" font-weight="650">Software engineer exploring AI in real systems.</text>
  </g>
  <text x="50" y="136" fill="#AAB4C0" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13" letter-spacing="0.7">Edge AI · agent systems · secure software</text>
  <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" fill="#6F7B88" font-size="9" letter-spacing="1.3">
    <text x="50" y="184">CURRENT COORDINATES</text>
    <path d="M50 194H195" stroke="#6F7B88" stroke-opacity="0.45"/>
  </g>

  <g fill="none" stroke="#71808E" stroke-opacity="0.46" stroke-width="1.2" stroke-linecap="round">
    <path class="route" d="M890 108C828 83 783 63 721 54"/>
    <path class="route" d="M910 108C972 82 1017 66 1081 58"/>
    <path class="route" d="M910 120C974 142 1021 160 1082 169"/>
    <path class="route" d="M890 120C827 143 781 160 720 170"/>
    <path d="M721 54C818 27 984 30 1081 58" stroke-opacity="0.16"/>
    <path d="M720 170C818 199 984 198 1082 169" stroke-opacity="0.16"/>
    <ellipse cx="900" cy="114" rx="80" ry="35" stroke="#C58A5A" stroke-opacity="0.34" stroke-dasharray="3 6"/>
  </g>

  <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
    <g transform="translate(665 38)">
      <circle cx="0" cy="14" r="4" fill="#52B8FF"/>
      <text x="14" y="11" fill="#DDE5EC" font-size="20" font-weight="700" letter-spacing="0.7">EDGE AI</text>
      <text x="14" y="31" fill="#71808E" font-size="16" letter-spacing="0.2">local / on-device</text>
    </g>
    <g transform="translate(930 42)">
      <circle cx="0" cy="14" r="4" fill="#2DD4BF"/>
      <text x="14" y="11" fill="#DDE5EC" font-size="20" font-weight="700" letter-spacing="0.7">AGENT SYSTEMS</text>
      <text x="14" y="31" fill="#71808E" font-size="16" letter-spacing="0.2">tools / context / evals</text>
    </g>
    <g transform="translate(950 153)">
      <circle cx="0" cy="14" r="4" fill="#52B8FF"/>
      <text x="14" y="11" fill="#DDE5EC" font-size="20" font-weight="700" letter-spacing="0.55">SECURE SOFTWARE</text>
      <text x="14" y="31" fill="#71808E" font-size="16" letter-spacing="0.1">reliability / boundaries</text>
    </g>
    <g transform="translate(664 154)">
      <circle cx="0" cy="14" r="4" fill="#2DD4BF"/>
      <text x="14" y="11" fill="#DDE5EC" font-size="20" font-weight="700" letter-spacing="0.7">OPEN SOURCE</text>
      <text x="14" y="31" fill="#71808E" font-size="16" letter-spacing="0.2">learn / build / share</text>
    </g>
  </g>

  <g transform="translate(900 114)">
    <rect x="-43" y="-22" width="86" height="44" rx="22" fill="#151B23" stroke="#C58A5A" stroke-width="1.5"/>
    <circle cx="-32" cy="-11" r="2.5" fill="#C58A5A"/>
    <text y="6" text-anchor="middle" fill="#F3EDE2" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="19" font-weight="700" letter-spacing="0.5">ALINA</text>
  </g>

  <g class="traveller-static" transform="translate(820 130)" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
    <circle r="11" fill="#151B23" stroke="#C58A5A" stroke-width="1.5"/>
    <text y="5" text-anchor="middle" fill="#E4A26D" font-size="15" font-weight="800">A</text>
  </g>
  <g class="traveller" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
    <circle r="11" fill="#151B23" stroke="#E4A26D" stroke-width="1.5"/>
    <text y="5" text-anchor="middle" fill="#E4A26D" font-size="15" font-weight="800">A</text>
    <animateMotion dur="11s" repeatCount="indefinite" path="M900 80 C952 80 980 95 980 114 C980 140 948 150 900 150 C852 150 820 140 820 114 C820 95 848 80 900 80"/>
  </g>
</svg>
