<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 300" role="img" aria-labelledby="title desc">
  <title id="title">Hi, I'm Alina</title>
  <desc id="desc">I explore AI that works beyond the demo. A quiet signal travels from device to model, agent, and real-world systems.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0D1117"/>
      <stop offset="0.6" stop-color="#111820"/>
      <stop offset="1" stop-color="#0D1117"/>
    </linearGradient>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" fill="none" stroke="#9DA7B3" stroke-opacity="0.045"/>
    </pattern>
    <style><![CDATA[
      .signal { stroke-dasharray: 5 13; animation: flow 9s linear infinite; }
      @keyframes flow { to { stroke-dashoffset: -180; } }
      @media (prefers-reduced-motion: reduce) { .signal { animation: none; } }
    ]]></style>
  </defs>

  <rect x="5" y="5" width="710" height="290" rx="16" fill="url(#bg)" stroke="#C58A5A" stroke-opacity="0.34"/>
  <rect x="6" y="6" width="708" height="288" rx="15" fill="url(#grid)"/>

  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
    <text x="38" y="52" fill="#C58A5A" font-size="20" font-weight="650" letter-spacing="2.4">HI, I'M ALINA.</text>
    <text x="38" y="100" fill="#F3EDE2" font-size="31" font-weight="650">I explore AI that works</text>
    <text x="38" y="139" fill="#F3EDE2" font-size="31" font-weight="650">beyond the demo.</text>
  </g>
  <text x="38" y="179" fill="#9DA7B3" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14.5" letter-spacing="0.7">Edge AI · AI agents · applied LLMs · secure systems</text>

  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M38 246H176l24-14h156l24 14h156l24-14h122" stroke="#C58A5A" stroke-opacity="0.25" stroke-width="1.4"/>
    <path class="signal" d="M38 246H176l24-14h156l24 14h156l24-14h122" stroke="#C58A5A" stroke-opacity="0.7" stroke-width="1.7"/>
  </g>
  <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="10" letter-spacing="1" text-anchor="middle">
    <g fill="#52B8FF"><circle cx="90" cy="246" r="3.5"/><text x="90" y="272">DEVICE</text></g>
    <g fill="#C58A5A"><circle cx="278" cy="232" r="3.5"/><text x="278" y="221">MODEL</text></g>
    <g fill="#F3EDE2"><circle cx="458" cy="246" r="3.5"/><text x="458" y="272">AGENT</text></g>
    <g fill="#2DD4BF"><circle cx="620" cy="232" r="3.5"/><text x="620" y="221">REAL WORLD</text></g>
  </g>
</svg>
