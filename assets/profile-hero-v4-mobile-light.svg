<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 325" role="img" aria-labelledby="title desc">
  <title id="title">Hi, I'm Alina</title>
  <desc id="desc">Software engineer exploring AI in real systems. Alina moves through Edge AI, agent systems, secure software, and open source.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F6F3ED"/>
      <stop offset="0.55" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F4F0E8"/>
    </linearGradient>
    <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse">
      <path d="M28 0H0V28" fill="none" stroke="#65717E" stroke-opacity="0.065"/>
    </pattern>
    <filter id="glow" x="-300%" y="-300%" width="700%" height="700%">
      <feGaussianBlur stdDeviation="2.2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style><![CDATA[
      .route { stroke-dasharray: 2 7; }
      .traveller { filter: url(#glow); }
      .traveller-static { opacity: 0.72; }
      @media (prefers-reduced-motion: reduce) {
        .traveller { display: none; }
      }
    ]]></style>
  </defs>

  <rect x="5" y="5" width="710" height="315" rx="16" fill="url(#bg)" stroke="#A7643C" stroke-opacity="0.38"/>
  <rect x="6" y="6" width="708" height="313" rx="15" fill="url(#grid)"/>

  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
    <text x="36" y="46" fill="#A7643C" font-size="22" font-weight="650" letter-spacing="2.1">HI, I'M ALINA.</text>
    <text x="36" y="88" fill="#18202A" font-size="34" font-weight="650">Software engineer exploring</text>
    <text x="36" y="127" fill="#18202A" font-size="34" font-weight="650">AI in real systems.</text>
  </g>
  <text x="36" y="158" fill="#596673" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="20" letter-spacing="0.25">Edge AI · agent systems · secure software</text>

  <g fill="none" stroke="#65717E" stroke-opacity="0.5" stroke-width="1.2" stroke-linecap="round">
    <path class="route" d="M348 239C285 220 230 203 162 196"/>
    <path class="route" d="M372 239C437 220 493 203 558 196"/>
    <path class="route" d="M372 253C437 270 493 285 558 290"/>
    <path class="route" d="M348 253C285 270 230 285 162 290"/>
    <path d="M162 196C267 174 453 174 558 196" stroke-opacity="0.17"/>
    <path d="M162 290C267 312 453 312 558 290" stroke-opacity="0.17"/>
    <ellipse cx="360" cy="246" rx="68" ry="38" stroke="#A7643C" stroke-opacity="0.36" stroke-dasharray="3 6"/>
  </g>

  <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
    <g transform="translate(78 181)">
      <circle cx="0" cy="14" r="4" fill="#2679A8"/>
      <text x="13" y="12" fill="#26313D" font-size="26" font-weight="700" letter-spacing="0.35">EDGE AI</text>
    </g>
    <g transform="translate(476 181)">
      <circle cx="0" cy="14" r="4" fill="#167C6C"/>
      <text x="13" y="12" fill="#26313D" font-size="26" font-weight="700" letter-spacing="0.35">AGENT SYSTEMS</text>
    </g>
    <g transform="translate(426 276)">
      <circle cx="0" cy="14" r="4" fill="#2679A8"/>
      <text x="13" y="12" fill="#26313D" font-size="26" font-weight="700" letter-spacing="0.15">SECURE SOFTWARE</text>
    </g>
    <g transform="translate(72 276)">
      <circle cx="0" cy="14" r="4" fill="#167C6C"/>
      <text x="13" y="12" fill="#26313D" font-size="26" font-weight="700" letter-spacing="0.35">OPEN SOURCE</text>
    </g>
  </g>

  <g transform="translate(360 246)">
    <rect x="-58" y="-25" width="116" height="50" rx="25" fill="#FFFFFF" stroke="#A7643C" stroke-width="1.5"/>
    <circle cx="-45" cy="-13" r="3" fill="#A7643C"/>
    <text y="8" text-anchor="middle" fill="#18202A" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="25" font-weight="700" letter-spacing="0.7">ALINA</text>
  </g>

  <g class="traveller-static" transform="translate(292 230)" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
    <circle r="16" fill="#FFFFFF" stroke="#A7643C" stroke-width="2"/>
    <text y="7" text-anchor="middle" fill="#A7643C" font-size="22" font-weight="800">A</text>
  </g>
  <g class="traveller" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
    <circle r="16" fill="#FFFFFF" stroke="#B96F42" stroke-width="2"/>
    <text y="7" text-anchor="middle" fill="#A7643C" font-size="22" font-weight="800">A</text>
    <animateMotion dur="11s" repeatCount="indefinite" path="M360 208 C402 208 428 222 428 246 C428 269 402 280 360 280 C318 280 292 269 292 246 C292 222 318 208 360 208"/>
  </g>
</svg>
