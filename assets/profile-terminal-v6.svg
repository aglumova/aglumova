<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="260" viewBox="0 0 1200 260" role="img" aria-labelledby="title desc">
  <title id="title">Alina Glumova terminal profile</title>
  <desc id="desc">A terminal types that Alina Glumova is a software engineer driven by curiosity about AI, ML, and LLMs, exploring Edge AI, agents, and secure software.</desc>

  <defs>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#24303a" stroke-width="1" opacity="0.2"/>
    </pattern>
  </defs>

  <style>
    text {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      text-rendering: geometricPrecision;
    }
    .chrome { fill: #82909d; font-size: 16px; letter-spacing: 0.02em; }
    .line { fill: #eee9df; font-size: 22px; }
    .prompt { fill: #d0945c; }
    .path { fill: #8996a3; }
    .label { fill: #5db7ee; }
    .value { fill: #eee9df; }
    .accent { fill: #43d6c4; }
    .cursor { fill: #d0945c; }

    @media (prefers-reduced-motion: no-preference) {
      .command { clip-path: inset(0 100% 0 0); animation: command 11s steps(13, end) infinite; }
      .name { clip-path: inset(0 100% 0 0); animation: name 11s steps(26, end) infinite; }
      .role { clip-path: inset(0 100% 0 0); animation: role 11s steps(31, end) infinite; }
      .driven { clip-path: inset(0 100% 0 0); animation: driven 11s steps(40, end) infinite; }
      .exploring { clip-path: inset(0 100% 0 0); animation: exploring 11s steps(49, end) infinite; }
      .final-prompt { opacity: 0; animation: finalPrompt 11s step-end infinite; }
      .cursor { opacity: 0; animation: cursorBlink 11s step-end infinite; }

      @keyframes command {
        0%, 2% { clip-path: inset(0 100% 0 0); }
        11%, 100% { clip-path: inset(0 0 0 0); }
      }
      @keyframes name {
        0%, 14% { clip-path: inset(0 100% 0 0); }
        21%, 100% { clip-path: inset(0 0 0 0); }
      }
      @keyframes role {
        0%, 24% { clip-path: inset(0 100% 0 0); }
        32%, 100% { clip-path: inset(0 0 0 0); }
      }
      @keyframes driven {
        0%, 35% { clip-path: inset(0 100% 0 0); }
        49%, 100% { clip-path: inset(0 0 0 0); }
      }
      @keyframes exploring {
        0%, 52% { clip-path: inset(0 100% 0 0); }
        63%, 100% { clip-path: inset(0 0 0 0); }
      }
      @keyframes finalPrompt {
        0%, 66% { opacity: 0; }
        67%, 100% { opacity: 1; }
      }
      @keyframes cursorBlink {
        0%, 66% { opacity: 0; }
        67%, 72%, 79%, 86%, 93%, 100% { opacity: 1; }
        73%, 78%, 80%, 85%, 87%, 92%, 94%, 99% { opacity: 0; }
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .command, .name, .role, .driven, .exploring { clip-path: none; animation: none; }
      .final-prompt, .cursor { opacity: 1; animation: none; }
    }
  </style>

  <rect x="1" y="1" width="1198" height="258" rx="10" fill="#0d141b" stroke="#46515c" stroke-width="2"/>
  <rect x="2" y="47" width="1196" height="211" rx="9" fill="url(#grid)"/>
  <path d="M 1 47 H 1199" stroke="#303b45" stroke-width="1"/>
  <text x="28" y="30" class="chrome">alina@github — about.txt</text>
  <circle cx="1169" cy="24" r="4" fill="#43d6c4" opacity="0.85"/>

  <g class="line">
    <text x="34" y="80"><tspan class="prompt">alina@github</tspan><tspan class="path"> ~ </tspan><tspan class="prompt">% </tspan><tspan class="command value">cat about.txt</tspan></text>
    <text x="34" y="112" class="name"><tspan class="label">name</tspan><tspan dx="82" class="value">Alina Glumova</tspan></text>
    <text x="34" y="144" class="role"><tspan class="label">role</tspan><tspan dx="82" class="value">software engineer</tspan></text>
    <text x="34" y="176" class="driven"><tspan class="label">driven by</tspan><tspan dx="28" class="value">curiosity · AI · ML · LLMs</tspan></text>
    <text x="34" y="208" class="exploring"><tspan class="label">exploring</tspan><tspan dx="28" class="value">Edge AI · agents · secure software</tspan></text>
    <text x="34" y="240" class="final-prompt"><tspan class="prompt">alina@github</tspan><tspan class="path"> ~ </tspan><tspan class="prompt">% </tspan></text>
    <rect class="cursor" x="263" y="221" width="13" height="23" rx="1"/>
  </g>
</svg>
