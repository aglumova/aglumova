<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 340" role="img" aria-labelledby="title desc">
  <title id="title">Alina Glumova — AI Agent Infrastructure</title>
  <desc id="desc">A restrained codegraph carries a signal through context, plan, change, test, and audit around Alina Glumova's name.</desc>
  <defs>
    <linearGradient id="light-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F6F3ED"/>
      <stop offset="0.52" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F6F3ED"/>
    </linearGradient>
    <pattern id="light-grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#65717E" stroke-opacity="0.075" stroke-width="1"/>
    </pattern>
    <style><![CDATA[
      .signal { stroke-dasharray: 7 15; animation: signal-flow 8s linear infinite; }
      .pulse { animation: node-pulse 5s ease-in-out infinite; }
      .p2 { animation-delay: 1s; }
      .p3 { animation-delay: 2s; }
      .p4 { animation-delay: 3s; }
      .p5 { animation-delay: 4s; }
      @keyframes signal-flow { to { stroke-dashoffset: -220; } }
      @keyframes node-pulse { 0%, 18%, 100% { opacity: .13; } 7% { opacity: .55; } }
      @media (prefers-reduced-motion: reduce) {
        .signal, .pulse { animation: none; }
        .pulse { opacity: .22; }
      }
    ]]></style>
  </defs>

  <rect x="8" y="8" width="1184" height="324" rx="20" fill="url(#light-bg)" stroke="#A7643C" stroke-opacity="0.4"/>
  <rect x="9" y="9" width="1182" height="322" rx="19" fill="url(#light-grid)"/>

  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M34 78h116l30 30h116l28-28h92" stroke="#2679A8" stroke-opacity="0.19"/>
    <path d="M784 80h92l30 30h116l28-28h116" stroke="#167C6C" stroke-opacity="0.18"/>
    <path d="M34 78h116l30 30h116l28-28h92" class="signal" stroke="#2679A8" stroke-opacity="0.52" stroke-width="1.5"/>
    <path d="M784 80h92l30 30h116l28-28h116" class="signal" stroke="#167C6C" stroke-opacity="0.48" stroke-width="1.5"/>

    <path d="M58 258h92l49-28h127l49 28h225l49-28h127l49 28h225l49-28h43" stroke="#A7643C" stroke-opacity="0.29" stroke-width="1.5"/>
    <path d="M58 258h92l49-28h127l49 28h225l49-28h127l49 28h225l49-28h43" class="signal" stroke="#A7643C" stroke-opacity="0.66" stroke-width="2"/>
  </g>

  <g fill="#65717E" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="10" letter-spacing="2">
    <text x="36" y="42">LOCAL-FIRST / 01</text>
    <text x="1164" y="42" text-anchor="end">VERIFIED / 05</text>
  </g>

  <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" text-anchor="middle">
    <text x="600" y="130" fill="#18202A" font-size="42" font-weight="700" letter-spacing="9">ALINA GLUMOVA</text>
    <text x="600" y="166" fill="#A7643C" font-size="16" font-weight="600" letter-spacing="5">AI AGENT INFRASTRUCTURE</text>
    <line x1="474" y1="185" x2="726" y2="185" stroke="#2679A8" stroke-opacity="0.5"/>
    <circle cx="466" cy="185" r="2.5" fill="#2679A8"/>
    <circle cx="734" cy="185" r="2.5" fill="#167C6C"/>
    <text x="600" y="210" fill="#65717E" font-size="12" letter-spacing="3">MCP · CODE INTELLIGENCE · EVALS</text>
  </g>

  <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" text-anchor="middle">
    <g>
      <circle class="pulse" cx="150" cy="258" r="17" fill="#2679A8" opacity="0.13"/>
      <circle cx="150" cy="258" r="5" fill="#FFFFFF" stroke="#2679A8" stroke-width="2"/>
      <text x="150" y="298" fill="#65717E" font-size="11" letter-spacing="2">CONTEXT</text>
    </g>
    <g>
      <circle class="pulse p2" cx="375" cy="258" r="17" fill="#A7643C" opacity="0.13"/>
      <circle cx="375" cy="258" r="5" fill="#FFFFFF" stroke="#A7643C" stroke-width="2"/>
      <text x="375" y="298" fill="#65717E" font-size="11" letter-spacing="2">PLAN</text>
    </g>
    <g>
      <circle class="pulse p3" cx="600" cy="258" r="17" fill="#A7643C" opacity="0.13"/>
      <circle cx="600" cy="258" r="5" fill="#FFFFFF" stroke="#A7643C" stroke-width="2"/>
      <text x="600" y="298" fill="#18202A" font-size="11" letter-spacing="2">CHANGE</text>
    </g>
    <g>
      <circle class="pulse p4" cx="825" cy="258" r="17" fill="#167C6C" opacity="0.13"/>
      <circle cx="825" cy="258" r="5" fill="#FFFFFF" stroke="#167C6C" stroke-width="2"/>
      <text x="825" y="298" fill="#65717E" font-size="11" letter-spacing="2">TEST</text>
    </g>
    <g>
      <circle class="pulse p5" cx="1050" cy="258" r="17" fill="#167C6C" opacity="0.13"/>
      <circle cx="1050" cy="258" r="5" fill="#FFFFFF" stroke="#167C6C" stroke-width="2"/>
      <text x="1050" y="298" fill="#65717E" font-size="11" letter-spacing="2">AUDIT</text>
    </g>
  </g>

  <g fill="#65717E" opacity="0.46">
    <circle cx="180" cy="108" r="2"/><circle cx="296" cy="108" r="2"/><circle cx="324" cy="80" r="2"/>
    <circle cx="906" cy="110" r="2"/><circle cx="1022" cy="110" r="2"/><circle cx="1050" cy="82" r="2"/>
  </g>
</svg>
